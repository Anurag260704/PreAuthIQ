# Uptime monitor — keeps Render backend awake (free tier ~15 min idle sleep)
# Used by backend/scripts/uptime_monitor.py and documents expected production URLs.

services:
  - name: backend
    url: https://preauthiq.onrender.com
    ping_path: /api/v1/status
    timeout: 30.0
    expected_status: 200

  - name: frontend
    url: https://pre-auth-iq.vercel.app
    ping_path: /
    timeout: 30.0
    expected_status: 200

# Ping interval in seconds (default: 600 = 10 minutes)
interval_seconds: 600

max_retries: 3
retry_delay: 5.0
timeout: 30.0
log_responses: false
