name: PreAuthIQ Uptime

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  BACKEND_URL: https://preauthiq.onrender.com
  FRONTEND_URL: https://pre-auth-iq.vercel.app

jobs:
  ping-services:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Render backend
        run: |
          echo "Pinging Render backend..."

          for i in {1..3}; do
            echo "Attempt $i"

            if curl -L -sS \
              --connect-timeout 10 \
              --max-time 120 \
              -o /dev/null \
              -w "HTTP %{http_code} | Time %{time_total}s\n" \
              "${BACKEND_URL}/api/v1/status"; then
              echo "Backend responded successfully"
              exit 0
            fi

            echo "Retrying in 20 seconds..."
            sleep 20
          done

          echo "Render backend did not respond after retries"
          exit 1

      - name: Ping Vercel frontend
        run: |
          curl -L -sS \
            --connect-timeout 10 \
            --max-time 30 \
            -o /dev/null \
            -w "Frontend HTTP %{http_code} | Time %{time_total}s\n" \
            "${FRONTEND_URL}"

      - name: Log completion
        run: echo "Completed at $(date -u)"
