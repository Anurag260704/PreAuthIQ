name: PreAuthIQ Uptime

on:
  schedule:
    # Every 10 minutes — Render free tier sleeps after ~15 min idle
    - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  BACKEND_URL: https://preauthiq.onrender.com
  FRONTEND_URL: https://pre-auth-iq.vercel.app

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          echo "Pinging ${BACKEND_URL}/api/v1/status ..."
          curl -f -sS --max-time 30 -o /dev/null -w "Backend HTTP %{http_code} in %{time_total}s\n" \
            "${BACKEND_URL}/api/v1/status"

      - name: Ping Vercel frontend
        run: |
          echo "Pinging ${FRONTEND_URL} ..."
          curl -f -sS --max-time 30 -o /dev/null -w "Frontend HTTP %{http_code} in %{time_total}s\n" \
            "${FRONTEND_URL}/"

      - name: Log success
        run: echo "Uptime check completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
