name: MedClear Uptime

on:
  schedule:
    # Run every 10 minutes to keep Render services awake
    - cron: "*/10 * * * *"
  workflow_dispatch:
    # Allow manual trigger

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          echo "Pinging backend..."
          curl -f -s -o /dev/null -w "Backend status: %{http_code}\n" \
            https://medclear-api.onrender.com/api/v1/status
      
      - name: Ping Frontend
        run: |
          echo "Pinging frontend..."
          curl -f -s -o /dev/null -w "Frontend status: %{http_code}\n" \
            https://medclear-app.onrender.com/

      - name: Log Success
        run: echo "Uptime check completed successfully"