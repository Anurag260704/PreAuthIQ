services:
  - type: web
    name: medclear-backend
    runtime: python
    pythonVersion: "3.11"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MISTRAL_API_KEY
      - key: API_KEY
      - key: ALLOWED_ORIGINS
        value: https://pre-auth-iq.vercel.app,https://pre-auth-ht40o7hfy-anurag-thakurs-projects-569da629.vercel.app
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENVIRONMENT
        value: "production"
    plan: free

  - type: static
    name: medclear-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://preauthiq.onrender.com
    plan: free